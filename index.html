<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qo'shtepa Tuman Ixtisoslashtirilgan Maktabi - Smart System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-gradient: linear-gradient(135deg, #001f3f 0%, #007bff 100%);
        }
        [data-gender="female"] {
            --accent: #ff4d94;
            --bg-gradient: linear-gradient(135deg, #2b001a 0%, #ff1a75 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.3s ease; }
        body { background: var(--bg-gradient); background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Glass Design */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 30px; width: 95%; max-width: 1000px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin: 20px;
        }

        input, select {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.08); color: white; outline: none;
        }
        .btn-main {
            background: var(--accent); color: #000; padding: 12px 30px; border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%;
        }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--accent); }

        .role-box { display: flex; gap: 10px; margin: 15px 0; }
        .role-option {
            flex: 1; padding: 10px; border: 1px solid var(--glass-border); border-radius: 10px;
            cursor: pointer; background: rgba(255,255,255,0.05); font-size: 12px;
        }
        .role-option.active { background: var(--accent); color: #000; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card i { font-size: 30px; color: var(--accent); margin-bottom: 10px; }

        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 15px;
            border: 1px solid var(--accent); z-index: 10000; display: flex; align-items: center; gap: 10px;
        }
        #custom-alert.show { top: 20px; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <i class="fas fa-bell"></i> <span id="alert-text"></span>
    </div>

    <div class="glass-panel" id="app-container">
        
        <div id="login-screen">
            <h2 style="margin-bottom: 20px;">Tizimga <span style="color: var(--accent);">Kirish</span></h2>
            
            <div class="role-box">
                <div class="role-option active" onclick="setRole('student', this)">O'quvchi</div>
                <div class="role-option" onclick="setRole('teacher', this)">O'qituvchi</div>
            </div>

            <div style="max-width: 400px; margin: 0 auto;">
                <input type="text" id="user-surname" placeholder="Familiyangiz">
                <input type="text" id="user-firstname" placeholder="Ismingiz" oninput="detectGender()">
                
                <div id="student-fields">
                    <select id="user-grade">
                        <option value="">Sinfni tanlang</option>
                        <script>
                            const grades = ["5a", "5b", "6a", "6b", "7a", "7b", "8a", "8b", "9a", "9b", "10a", "10b", "11a", "11b"];
                            grades.forEach(g => document.write(`<option value="${g}">${g}-sinf</option>`));
                        </script>
                    </select>
                </div>

                <div id="teacher-fields" class="hidden">
                    <select id="user-subject">
                        <option value="">Faningizni tanlang</option>
                        <option value="Matematika">Matematika</option>
                        <option value="Ingliz tili">Ingliz tili</option>
                        <option value="Ona tili">Ona tili</option>
                        <option value="Fizika">Fizika</option>
                        <option value="IT">Informatika</option>
                    </select>
                </div>

                <input type="password" id="user-password" placeholder="Parolingizni kiriting">
                
                <button class="btn-main" onclick="handleLogin()">TIZIMGA KIRISH</button>
                <button id="get-pass-btn" class="btn-main" style="background:none; border:1px solid var(--accent); color:white; font-size:12px;" onclick="generatePassword()">PAROL OLISH</button>
            </div>
        </div>

        <div id="dashboard" class="hidden">
            <h2 id="greet-name">Xush kelibsiz!</h2>
            <p id="greet-sub" style="opacity: 0.7; margin-bottom: 20px;"></p>
            
            <div class="menu-grid">
                <div class="card" onclick="showAttendance()">
                    <i class="fas fa-user-clock"></i>
                    <h3>Davomat / Kechikish</h3>
                </div>
                <div class="card" onclick="myAlert('Yaqinda yangi testlar yuklanadi')">
                    <i class="fas fa-book-open"></i>
                    <h3>O'quv materiallari</h3>
                </div>
                <div class="card" onclick="location.reload()">
                    <i class="fas fa-sign-out-alt"></i>
                    <h3>Chiqish</h3>
                </div>
            </div>
        </div>

        <div id="attendance-modal" class="hidden" style="margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 20px;">
            <h3 style="color: var(--accent); margin-bottom: 15px;">Mening kechikishlarim</h3>
            <div id="attendance-list">
                <p>Hozircha ma'lumot yo'q. (Admin tomonidan rasm yuklanishi kutilmoqda)</p>
            </div>
            <button class="btn-main" style="width: auto;" onclick="closeAttendance()">Yopish</button>
        </div>

    </div>

    <script>
        // 1. TELEGRAM SOZLAMALARI (O'zingiznikini yozing)
        const BOT_TOKEN = "7709841804:AAEj3B26fB_m_Y7hP5Ew6WwQ3ZlX0X0X0X0"; // BOTFATHERDAN OLGAN TOKEN
        const CHAT_ID = "6348123456"; // @userinfobot orqali olingan ID
        
        let currentRole = 'student';

        function myAlert(msg) {
            const alertBox = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = msg;
            alertBox.classList.add('show');
            setTimeout(() => alertBox.classList.remove('show'), 3000);
        }

        function setRole(role, el) {
            currentRole = role;
            document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('student-fields').classList.toggle('hidden', role !== 'student');
            document.getElementById('teacher-fields').classList.toggle('hidden', role !== 'teacher');
            document.getElementById('get-pass-btn').innerText = role === 'student' ? 'PAROL OLISH (O\'QUVCHI)' : 'PAROL OLISH (O\'QITUVCHI)';
        }

        function detectGender() {
            const name = document.getElementById('user-firstname').value.toLowerCase();
            if (name.endsWith('eva') || name.endsWith('ova') || name.endsWith('qizi')) {
                document.body.setAttribute('data-gender', 'female');
            } else { document.body.removeAttribute('data-gender'); }
        }

        // PAROL GENERATSIYA VA ADMINGA YUBORISH
        async function generatePassword() {
            const surname = document.getElementById('user-surname').value;
            const name = document.getElementById('user-firstname').value;
            const info = currentRole === 'student' ? document.getElementById('user-grade').value : document.getElementById('user-subject').value;

            if (!surname || !name || !info) {
                myAlert("Iltimos, hamma joyni to'ldiring!");
                return;
            }

            const pass = surname.substring(0,2).toUpperCase() + Math.floor(1000 + Math.random() * 8999);
            myAlert("Parolingiz: " + pass);
            document.getElementById('user-password').value = pass;

            // Telegramga yuborish
            const text = `🚀 YANGI FOYDALANUVCHI:\n👤: ${surname} ${name}\n🎭: ${currentRole.toUpperCase()}\n📍: ${info}\n🔑: ${pass}`;
            await fetch(`https://api.telegram.org/bot${8593520889:AAEs2TrS8jbfwJjyTAccIcTXQfpPXKBvd14}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
        }

        function handleLogin() {
            const surname = document.getElementById('user-surname').value;
            const name = document.getElementById('user-firstname').value;
            const pass = document.getElementById('user-password').value;

            if (!surname || !name || !pass) {
                myAlert("Login yoki parol xato!");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('greet-name').innerText = `SALOM, ${name.toUpperCase()}!`;
            document.getElementById('greet-sub').innerText = `${currentRole === 'student' ? 'O\'quvchi' : 'O\'qituvchi'} | Tizim faol`;
        }

        function showAttendance() {
            document.getElementById('attendance-modal').classList.remove('hidden');
            // Bu yerda kelajakda rasmlarni ko'rsatish mantiqi bo'ladi
        }

        function closeAttendance() {
            document.getElementById('attendance-modal').classList.add('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qo'shtepa Tuman Ixtisoslashtirilgan Maktabi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-gradient: linear-gradient(135deg, #001f3f 0%, #007bff 100%);
        }
        [data-gender="female"] {
            --accent: #ff4d94;
            --bg-gradient: linear-gradient(135deg, #2b001a 0%, #ff1a75 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }
        .hidden { display: none !important; }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 40px;
            width: 95%; max-width: 1100px; max-height: 90vh;
            overflow-y: auto; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        #splash {
            position: fixed; inset: 0; background: #001529;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000;
        }
        .loader {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear; margin: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1); color: white; outline: none;
        }
        option { background: #111; color: white; }
        .btn-main {
            background: var(--accent); color: #000; padding: 15px 45px;
            border: none; border-radius: 50px; font-weight: bold;
            cursor: pointer; margin-top: 15px;
        }
        #custom-alert {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px;
            border: 1px solid var(--accent); z-index: 100001; transition: 0.5s;
        }
        #custom-alert.show { top: 30px; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <span id="alert-text"></span>
        <button onclick="closeAlert()" style="margin-left:10px; padding:5px 10px; cursor:pointer;">OK</button>
    </div>

    <div id="splash">
        <h2>Yuklanmoqda...</h2>
        <div class="loader"></div>
    </div>

    <div class="glass-panel hidden" id="app-container">
        <div id="login-screen">
            <h2>Tizimga Kirish</h2>
            <input type="text" id="user-fullname" placeholder="Ism va Familiya" oninput="detectGender()">
            <select id="user-grade">
                <option value="">Sinfni tanlang</option>
            </select>
            <input type="password" id="access-code" placeholder="Kodi (1123)">
            <button class="btn-main" onclick="handleLogin()">KIRISH</button>
        </div>

        <div id="dashboard" class="hidden">
            <h1 id="greet-title"></h1>
            <p>Xush kelibsiz maktabimiz tizimiga!</p>
            <button class="btn-main" onclick="location.reload()">Chiqish</button>
        </div>
    </div>

    <script>
        // Splash screen olib tashlash
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');
            }, 2000);

            // Sinfni to'ldirish (document.write ishlatmasdan)
            const grades = ["5a", "5b", "6a", "6b", "7a", "7b", "8a", "9a", "10a", "11a"];
            const select = document.getElementById('user-grade');
            grades.forEach(g => {
                let opt = document.createElement('option');
                opt.value = g;
                opt.innerText = g + "-sinf";
                select.appendChild(opt);
            });
        };

        function detectGender() {
            const name = document.getElementById('user-fullname').value.toLowerCase();
            if (name.endsWith('eva') || name.endsWith('ova') || name.endsWith('qizi')) {
                document.body.setAttribute('data-gender', 'female');
            } else { document.body.removeAttribute('data-gender'); }
        }

        function handleLogin() {
            const name = document.getElementById('user-fullname').value;
            const code = document.getElementById('access-code').value;
            if (name && code === '1123') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('greet-title').innerText = "Salom, " + name;
            } else {
                myAlert("Ism yoki kod xato!");
            }
        }

        function myAlert(msg) {
            document.getElementById('alert-text').innerText = msg;
            document.getElementById('custom-alert').classList.add('show');
        }
        function closeAlert() { document.getElementById('custom-alert').classList.remove('show'); }
    </script>
</body>
</html>
